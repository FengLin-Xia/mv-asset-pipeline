name: mvcase
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - pip
  - ffmpeg          # conda-forge 提供，包含 ffprobe
  - numpy
  - pandas
  - pip:
    - opencv-python
    - pydantic>=2.0
    - python-dotenv
    - tqdm
    - rich
    - scenedetect[opencv]
    - librosa
    - soundfile
    - requests
    - pillow
    # torch 相关请单独按显卡情况安装，见 README
    # pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
